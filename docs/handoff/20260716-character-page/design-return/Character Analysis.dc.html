<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}">
class Component extends DCLogic {
  state = {
    theme: 'warm', selected: null, generating: null,
    primaryTab: 'overview', subTab: 'persona', framework: 'jung',
    landingView: 'quadrant', drawer: null, epiCursor: 7, cmpCursor: 7,
    tip: true, search: '', otherOpen: false, batch: null,
    compareName: null, toast: null, hoverBubble: null, activeArc: null,
    expandRank: false, genStep: 0, archFilter: [], archOpen: false, archSearch: ''
  };

  componentDidMount() {
    document.documentElement.dataset.theme = this.state.theme;
    this._onKey = (e) => { if (e.key === 'Escape') this.setState({ drawer: null, batch: null }); };
    window.addEventListener('keydown', this._onKey);
  }
  componentWillUnmount() { window.removeEventListener('keydown', this._onKey); if (this._genT) clearInterval(this._genT); }

  setTheme(t) { document.documentElement.dataset.theme = t; this.setState({ theme: t }); }
  toast(msg) { this.setState({ toast: msg }); clearTimeout(this._toastT); this._toastT = setTimeout(() => this.setState({ toast: null }), 2600); }

  select(name) {
    const c = this.getChars().find(x => x.name === name);
    this.setState({ selected: name, generating: null, primaryTab: 'overview', subTab: 'persona', epiCursor: 7, activeArc: null, compareName: null });
  }
  clearSel() { this.setState({ selected: null, generating: null }); }

  startGen(name) {
    this.setState({ generating: name, selected: name, genStep: 0 });
    if (this._genT) clearInterval(this._genT);
    this._genT = setInterval(() => {
      this.setState(s => {
        if (s.genStep >= 5) { clearInterval(this._genT); return null; }
        return { genStep: s.genStep + 1 };
      });
    }, 850);
  }

  hash(s) { let x = 0; for (const ch of s) x = (x * 31 + ch.charCodeAt(0)) >>> 0; return x; }

  getChars() {
    if (this._chars) return this._chars;
    const RAW = ['楊素','楊廣','張士和','推山手','王須拔','焦邪','史萬歲','楊堅','楊勇','徐','言老大','算死草','寇仲','彭孝才','李子通','白信','秦超文','左孝友','楊公卿','李弘芝','胡劉苗','王德仁','白老夫子','石龍','貞嫂','廣成子','黃帝','白衣女子','白衣女','宇文傷','老馮','徐子陵','惡大婦','臭言老大','田文','石師傅','守備大人','臭老言','尉遲勝','周宣帝','鄭譯','劉昉','宇文闡','尉遲迥','司馬消難','王謙','李淵','獨孤太后','言寬','常次','臭老大言寬','傅采林','紅阿姑','白女衣','周平','陳望','尉遲叔叔','沈縣官','宇文大人','小娟姐','沈縣丞','小娟','畢玄','宋師道','東海李子通','杜伏威','宋缺','宋智','宋玉華','宋玉致','解暉','解文龍','鬼谷子','宋屁道','寧道奇','宋魯','柳菁','秦昭襄王','趙惠文王','藺相如','秦王','秦始皇','李斯','漢高祖劉邦','秦王子嬰','王莽','王舜','孝元太后','卞和','楚厲王','武王','文王','漢少帝','孫堅','曹操','陳主','散真人','高麗王'];
    const FAC = [
      { i: 0, coh: 0.90, names: ['楊廣','楊堅','李淵','鄭譯','獨孤太后','劉昉'] },
      { i: 1, coh: 0.733, names: ['宋缺','宋智','解暉','宋玉華','解文龍','宋玉致'] },
      { i: 2, coh: 0.825, names: ['寇仲','徐子陵','白衣女','徐'] },
      { i: 3, coh: 0.567, names: ['宇文化及','尉遲勝','尉遲迥'] },
      { i: 4, coh: 0.567, names: ['宋師道','宋魯','柳菁'] },
      { i: 5, coh: 0.467, names: ['李子通','左孝友','杜伏威'] },
      { i: 6, coh: 0.40, names: ['周宣帝','宇文闡'] },
      { i: 7, coh: 0.35, names: ['貞嫂','老馮'] },
      { i: 8, coh: 0.30, names: ['常次','言寬'] },
      { i: 9, coh: 0.40, names: ['石龍','田文'] }
    ];
    this._factions = FAC;
    const FM = {};
    FAC.forEach(f => f.names.forEach(n => { FM[n] = f.i; }));
    const M = { '寇仲': 1002, '徐子陵': 701, '宇文化及': 225, '白衣女': 180, '楊廣': 138, '尉遲勝': 110, '石龍': 96, '宋師道': 88, '楊素': 82, '李淵': 76, '宋缺': 70, '杜伏威': 64, '李子通': 58, '傅采林': 54, '宋玉致': 50, '解暉': 46, '畢玄': 44, '尉遲迥': 42, '楊堅': 40, '寧道奇': 38, '獨孤太后': 36, '宋智': 32, '白衣女子': 30 };
    const list = RAW.map(n => ({ name: n, analyzed: false }));
    list.push({ name: '宇文化及', analyzed: true, jung: '統治者', schmidt: '暴君' });
    list.forEach(c => {
      const hx = this.hash(c.name);
      c.mentions = M[c.name] || (1 + (hx % 24));
      c.fac = (c.name in FM) ? FM[c.name] : null;
      c.rel = c.name === '宇文化及' ? 11 : (1 + (hx % 13));
      c.hy = (this.hash(c.name + 'y') % 1000) / 1000;
    });
    const logs = list.map(c => Math.log10(c.mentions + 1));
    const maxL = Math.max(...logs), minL = Math.min(...logs);
    list.forEach(c => {
      c.x = (Math.log10(c.mentions + 1) - minL) / (maxL - minL || 1);
      c.y = Math.min(0.97, Math.max(0.03, c.x * 0.48 + c.hy * 0.52));
    });
    const med = arr => { const s = [...arr].sort((a, b) => a - b); const m = Math.floor(s.length / 2); return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2; };
    this._medX = med(list.map(c => c.x));
    this._medY = med(list.map(c => c.y));
    list.sort((a, b) => b.mentions - a.mentions);
    this._chars = list;
    return list;
  }
  factions() { this.getChars(); return this._factions; }

    return i == null ? ['var(--bg-tertiary)', 'var(--fg-muted)'] : [`var(${FC[i][0]})`, `var(${FC[i][1]})`];
  }
