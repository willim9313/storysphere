<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Noto+Sans+TC:wght@400;500;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=IM+Fell+English:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
    <title>StorySphere</title>
    <script>
      // FOUC prevention: apply persisted theme before React mounts.
      // Mirrors VALID_THEMES in src/contexts/ThemeContext.tsx.
      try {
        var t = localStorage.getItem('storysphere:theme');
        if (t && ['default', 'manuscript', 'minimal-ink', 'pulp'].includes(t)) {
          document.documentElement.dataset.theme = t;
        }
      } catch (e) {
        console.warn('Theme bootstrap skipped:', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
